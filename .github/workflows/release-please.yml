name: Release Please

# Auto-tagging from conventional commits.
# - Every push to `main`: open or update a release-PR with the next version
#   bump (computed from conventional-commit prefixes since the last tag).
# - When that PR merges, release-please tags vX.Y.Z and creates a GitHub
#   Release. The `release.yml` workflow then runs to build + upload artifacts.
#
# Pre-release lines:
#   - Beta:  push to `beta` branch — release-please opens a beta-tagged PR.
#   - Stable: push to `main` — standard PR.

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # Beta branch → pre-release tagged `vX.Y.Z-beta.N`.
          # Main branch → standard `vX.Y.Z` releases.
          target-branch: ${{ github.ref_name }}

      - name: Show outputs
        if: always()
        run: |
          echo "release_created=${{ steps.release.outputs.release_created }}"
          echo "tag_name=${{ steps.release.outputs.tag_name }}"
          echo "version=${{ steps.release.outputs.version }}"
