name: Canary build

# Every push to main produces a canary build of the macOS app and updates a
# rolling "canary" GitHub release with the latest artifact. Canary versions
# get a -canary.<sha> suffix so users can pin to a specific commit.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"

jobs:
  build-macos:
    name: macOS canary
    # Single arm64 build. Intel Macs run it under Rosetta 2 — standard for
    # apps shipping in 2026. If we ever need a true universal binary we'd
    # bring back the matrix and `lipo`-merge the bun binaries.
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # release-please reads tag history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Compute canary version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          VERSION="${BASE}-canary.${SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Computed version: ${VERSION}"

      - name: Stamp canary version into package.json
        run: |
          node -e "
            const fs = require('node:fs');
            const path = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, '\t') + '\n');
          "

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build eliza submodule packages
        # Electrobun's bundler can't resolve `@elizaos/*` until the vendored
        # eliza packages have built dist/ + their proto-generated files.
        run: bun run build:eliza

      - name: Build canary app
        # electrobun's build pipeline tries to fetch the previous version's
        # update.json from release.baseUrl (configured in
        # electrobun.config.ts) so it can generate an incremental patch.
        # On a fresh canary URL with no prior release, the fetch returns
        # non-JSON (e.g. an HTML 404 page) and electrobun's `.json()` call
        # throws SyntaxError after the .app/.dmg are already built. We
        # tolerate that failure as long as the .app exists — full bundle
        # uploads work without patch generation.
        run: |
          set +e
          bun run build:canary
          BUILD_EXIT=$?
          set -e
          APP=$(find build -maxdepth 3 -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            echo "build:canary exit=$BUILD_EXIT, but .app produced at $APP — continuing"
          else
            echo "::error::build:canary exit=$BUILD_EXIT and no .app produced"
            exit $BUILD_EXIT
          fi

      - name: Ad-hoc sign + package artifacts
        run: |
          BUILD_DIR="build/canary-macos-arm64"
          APP=$(find "$BUILD_DIR" -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle in ${BUILD_DIR}"; ls -la build/ || true; exit 1
          fi
          # Ad-hoc sign (`-` identity) — free, doesn't bypass Gatekeeper but
          # makes the bundle internally consistent so de-quarantined installs
          # don't get translocation false-positives on macOS 14+.
          codesign --force --deep --sign - "$APP"
          ditto -c -k --keepParent "$APP" "Detour-canary.zip"
          DMG=$(find "$BUILD_DIR" -maxdepth 2 -name "*.dmg" -type f | head -1)
          if [ -n "$DMG" ]; then cp "$DMG" "Detour-canary.dmg"; fi

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: detour-canary-${{ github.sha }}
          path: |
            Detour-canary.zip
            Detour-canary.dmg
          retention-days: 14

      - name: Update rolling Canary release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          name: "Canary (rolling)"
          body: |
            Latest canary build from `main` @ ${{ github.sha }}.

            Built: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.event.head_commit.message }}

            ## Install

            One-liner (handles download + de-quarantine + install to /Applications):

            ```sh
            curl -fsSL https://raw.githubusercontent.com/Dexploarer/detour/main/scripts/install.sh | bash
            ```

            Or manually:

            1. Download `Detour-canary.zip`, unzip, drag `Detour.app` into `/Applications/`.
            2. Strip the macOS quarantine flag (required since the build isn't notarized):
               ```sh
               xattr -dr com.apple.quarantine /Applications/Detour.app
               ```
            3. Open. ⚠️  **Unstable** — canary tracks `main` and may break.
          prerelease: true
          make_latest: false
          files: |
            Detour-canary.zip
            Detour-canary.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
